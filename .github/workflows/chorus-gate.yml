# Dogfood the Chorus reliability gate on this repo's own PRs.
# On a PR it runs the suite, posts the verdict as a comment, and fails the check
# only on a statistically real regression. On push to main it refreshes the
# baseline so future PRs compare against the merged state.
name: Chorus Reliability Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Persist the baseline directory across runs so PRs compare against main.
      - uses: actions/cache@v4
        with:
          path: .chorus/baselines
          key: chorus-baseline-${{ hashFiles('chorus/benchmarks/loader.py') }}

      - uses: ./chorus/ci
        with:
          suite: synthetic
          n: "30"
          k: "5"
          update-baseline: ${{ github.event_name == 'push' }}
