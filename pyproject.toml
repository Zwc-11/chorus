[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "chorus-harness"
version = "0.1.0"
description = "Reliability and cost harness for coding agents."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Chorus contributors" }]
dependencies = [
  "typer>=0.12.5",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3,<9",
  "ruff>=0.6",
]

[project.scripts]
chorus = "chorus.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["chorus"]

[tool.pytest.ini_options]
addopts = "-s"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "SIM", "UP"]
