# Composite GitHub Action: the Chorus reliability gate.
# It wraps the `chorus gate` CLI (no logic in YAML), posts the report as a PR
# comment, and fails the check only on a *statistically real* regression --
# never on a raw pass^k dip. Baseline persistence is the caller's choice: commit
# `.chorus/baselines/` on the base branch, or restore/save it with actions/cache.
name: Chorus Reliability Gate
description: Run Chorus on a task suite and block a PR only when reliability reliably regresses.

inputs:
  suite:
    description: Benchmark suite to run.
    required: false
    default: "synthetic"
  n:
    description: Trajectories per task.
    required: false
    default: "30"
  k:
    description: Horizon for the pass^k delta.
    required: false
    default: "5"
  seed:
    description: Per-lane seed base (reproducible runs).
    required: false
    default: "7"
  update-baseline:
    description: Persist this run as the baseline (use on the base branch / after merge).
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Chorus
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .

    - name: Run reliability gate
      id: gate
      shell: bash
      run: |
        set +e
        chorus gate \
          --suite "${{ inputs.suite }}" \
          --n "${{ inputs.n }}" \
          --k "${{ inputs.k }}" \
          --seed "${{ inputs.seed }}" \
          ${{ inputs.update-baseline == 'true' && '--update-baseline' || '' }}
        echo "code=$?" >> "$GITHUB_OUTPUT"

    - name: Comment on the PR
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh pr comment "${{ github.event.number }}" --body-file .chorus/gate.md || true

    - name: Enforce the verdict
      shell: bash
      run: exit ${{ steps.gate.outputs.code }}
